        const copyFeedback = document.getElementById('copy-feedback');

        // 点击按钮时执行的函数
        generateBtn.addEventListener('click', () => {
            // 1. 生成一个随机索引
            const randomIndex = Math.floor(Math.random() * comments.length);

            // 2. 获取随机评论
            const randomComment = comments[randomIndex];

            // 3. 显示评论
            commentDisplay.textContent = randomComment;

            // 4. 复制到剪贴板
            navigator.clipboard.writeText(randomComment).then(() => {
                // 复制成功后显示提示信息
                copyFeedback.style.opacity = '1';
                
                // 2秒后自动隐藏提示信息
                setTimeout(() => {
                    copyFeedback.style.opacity = '0';
                }, 2000);

            }).catch(err => {
                console.error('复制失败: ', err);
                // 提供一个备用方案，以防自动复制失败
                alert('抱歉，自动复制失败了。评论已为你全选，请手动复制(Ctrl+C)。');
                // 尝试全选文本，方便用户手动复制
                const range = document.createRange();
                range.selectNodeContents(commentDisplay);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            });
        });
    </script>

</body>
</html>
